services:
  banking-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: banking-mcp-server:latest
    container_name: banking-mcp
    ports:
      - "80:80"        # Nginx reverse proxy (MCP)
    expose:
      - "8080"         # FastAPI + MCP, internal only (proxied by nginx)
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      AUDIT_LOG_PATH: /app/logs/audit.log
      DATA_DIR: /app/data
      ENV: prod
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
