services:
  banking-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: banking-mcp-server:latest
    container_name: banking-mcp
    ports:
      - "80:80"        # Nginx reverse proxy (dashboard + API)
      - "8080:8080"    # FastAPI + MCP endpoint (direct)
      - "8501:8501"    # Streamlit dashboard (direct)
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DASHBOARD_PORT: "8501"
      AUDIT_LOG_PATH: /app/logs/audit.log
      ENV: prod
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
