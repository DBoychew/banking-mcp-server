events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Timeouts for MCP streaming (long-lived SSE connections)
    proxy_read_timeout     300s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     300s;

    server {
        listen 80;
        server_name _;

        location = / {
            return 302 /dashboard/;
        }

        location = /wpad.dat {
            access_log off;
            log_not_found off;
            return 204;
        }

        # Health check — public
        location /health {
            proxy_pass http://127.0.0.1:8080/health;
            proxy_set_header Host $host;
        }

        # MCP endpoint — public (auth handled by API key in tools)
        location /mcp {
            proxy_pass http://127.0.0.1:8080/mcp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Accept-Encoding "";
        }

        # REST API — protected by API key middleware (in FastAPI)
        location /api/ {
            proxy_pass http://127.0.0.1:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Swagger UI
        location /docs {
            proxy_pass http://127.0.0.1:8080/docs;
            proxy_set_header Host $host;
        }

        # Streamlit dashboard — protected by basic auth
        location /dashboard/ {
            auth_basic           "Banking Dashboard";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://127.0.0.1:8501/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }

        # Streamlit static assets
        location /dashboard/_stcore/ {
            auth_basic off;
            proxy_pass http://127.0.0.1:8501/_stcore/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
